<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Asteroids</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; width: 100%; height: 100%; }

/* Touch controls */
#touch-controls {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 10;
  pointer-events: none;
  padding: 16px;
}
.touch-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.touch-btn {
  pointer-events: auto;
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: 2px solid rgba(0, 255, 200, 0.5);
  background: rgba(0, 255, 200, 0.1);
  color: rgba(0, 255, 200, 0.8);
  font-size: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
  user-select: none;
}
.touch-btn:active, .touch-btn.active {
  background: rgba(0, 255, 200, 0.3);
  border-color: rgba(0, 255, 200, 0.9);
}
.touch-btn.fire-btn {
  width: 80px;
  height: 80px;
  font-size: 14px;
  font-weight: bold;
  letter-spacing: 1px;
}
.touch-group {
  display: flex;
  gap: 12px;
  align-items: center;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="touch-controls">
  <div class="touch-row">
    <div class="touch-group">
      <button class="touch-btn" id="btn-left">&#9664;</button>
      <button class="touch-btn" id="btn-thrust">&#9650;</button>
      <button class="touch-btn" id="btn-right">&#9654;</button>
    </div>
    <button class="touch-btn fire-btn" id="btn-fire">FIRE</button>
  </div>
</div>
<script>
(() => {
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// --- Constants ---
const TAU = Math.PI * 2;
const SHIP_SIZE = 18;
const SHIP_THRUST = 280;
const SHIP_DRAG = 0.985;
const SHIP_TURN = 4.5;
const BULLET_SPEED = 500;
const BULLET_LIFE = 1.2;
const BULLET_MAX = 8;
const FIRE_RATE = 0.12;
const ASTEROID_SPEED_BASE = 40;
const ASTEROID_SPEED_RANGE = 60;
const ASTEROID_SIZES = [48, 24, 12];
const ASTEROID_SCORES = [20, 50, 100];
const ASTEROID_VERTS_MIN = 8;
const ASTEROID_VERTS_MAX = 14;
const INITIAL_ASTEROIDS = 4;
const LIVES_START = 3;
const INVULN_TIME = 3;
const PARTICLE_COUNT_EXPLODE = 20;
const PARTICLE_COUNT_THRUST = 2;
const STAR_COUNT = 200;

// --- State ---
let W, H;
let ship, bullets, asteroids, particles, stars;
let score, lives, level, gameState; // 'title', 'playing', 'gameover', 'levelclear'
let levelTimer, invulnTimer, fireTimer;
let keys = {};
let touchInputs = { left: false, right: false, thrust: false, fire: false };

// --- Resize ---
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- Stars (background) ---
function createStars() {
  stars = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.3,
      a: Math.random() * 0.6 + 0.2,
      twinkle: Math.random() * TAU
    });
  }
}

// --- Asteroid ---
function createAsteroid(x, y, sizeIdx, velOverride) {
  const r = ASTEROID_SIZES[sizeIdx];
  const angle = Math.random() * TAU;
  const speed = ASTEROID_SPEED_BASE + Math.random() * ASTEROID_SPEED_RANGE + level * 8;
  const vx = velOverride ? velOverride.x : Math.cos(angle) * speed;
  const vy = velOverride ? velOverride.y : Math.sin(angle) * speed;
  const numVerts = ASTEROID_VERTS_MIN + Math.floor(Math.random() * (ASTEROID_VERTS_MAX - ASTEROID_VERTS_MIN));
  const verts = [];
  for (let i = 0; i < numVerts; i++) {
    const a = (i / numVerts) * TAU;
    const dist = r * (0.7 + Math.random() * 0.3);
    verts.push({ x: Math.cos(a) * dist, y: Math.sin(a) * dist });
  }
  return { x, y, vx, vy, r, sizeIdx, verts, rot: Math.random() * TAU, rotSpeed: (Math.random() - 0.5) * 1.5 };
}

function spawnAsteroids(count) {
  for (let i = 0; i < count; i++) {
    let x, y;
    do {
      x = Math.random() * W;
      y = Math.random() * H;
    } while (ship && dist(x, y, ship.x, ship.y) < 150);
    asteroids.push(createAsteroid(x, y, 0));
  }
}

// --- Particles ---
function spawnParticles(x, y, count, color, speedMul) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * TAU;
    const speed = (30 + Math.random() * 120) * (speedMul || 1);
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.4 + Math.random() * 0.8,
      maxLife: 0.4 + Math.random() * 0.8,
      color: color || `hsl(${40 + Math.random() * 30}, 100%, ${60 + Math.random() * 30}%)`,
      r: 1 + Math.random() * 2
    });
  }
}

// --- Utility ---
function dist(x1, y1, x2, y2) {
  return Math.hypot(x2 - x1, y2 - y1);
}

function wrap(obj) {
  if (obj.x < -50) obj.x += W + 100;
  if (obj.x > W + 50) obj.x -= W + 100;
  if (obj.y < -50) obj.y += H + 100;
  if (obj.y > H + 50) obj.y -= H + 100;
}

// --- Init ---
function initGame() {
  score = 0;
  lives = LIVES_START;
  level = 1;
  bullets = [];
  asteroids = [];
  particles = [];
  fireTimer = 0;
  resetShip();
  spawnAsteroids(INITIAL_ASTEROIDS);
  gameState = 'playing';
  levelTimer = 0;
}

function resetShip() {
  ship = {
    x: W / 2, y: H / 2,
    vx: 0, vy: 0,
    angle: -Math.PI / 2,
    thrusting: false,
    alive: true
  };
  invulnTimer = INVULN_TIME;
}

function nextLevel() {
  level++;
  bullets = [];
  spawnAsteroids(INITIAL_ASTEROIDS + level - 1);
  gameState = 'playing';
  levelTimer = 0;
}

// --- Input ---
function isDown(action) {
  switch (action) {
    case 'left': return keys['ArrowLeft'] || keys['KeyA'] || touchInputs.left;
    case 'right': return keys['ArrowRight'] || keys['KeyD'] || touchInputs.right;
    case 'thrust': return keys['ArrowUp'] || keys['KeyW'] || touchInputs.thrust;
    case 'fire': return keys['Space'] || touchInputs.fire;
  }
}

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault();
  if (e.code === 'Enter') {
    if (gameState === 'title' || gameState === 'gameover') initGame();
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch controls
const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
if (isTouchDevice) {
  document.getElementById('touch-controls').style.display = 'block';

  function bindTouch(id, inputKey) {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', e => { e.preventDefault(); touchInputs[inputKey] = true; el.classList.add('active'); });
    el.addEventListener('touchend', e => { e.preventDefault(); touchInputs[inputKey] = false; el.classList.remove('active'); });
    el.addEventListener('touchcancel', e => { touchInputs[inputKey] = false; el.classList.remove('active'); });
  }
  bindTouch('btn-left', 'left');
  bindTouch('btn-right', 'right');
  bindTouch('btn-thrust', 'thrust');
  bindTouch('btn-fire', 'fire');

  canvas.addEventListener('touchstart', e => {
    if (gameState === 'title' || gameState === 'gameover') initGame();
  });
}

// --- Update ---
function update(dt) {
  if (gameState === 'title' || gameState === 'gameover') {
    // Still update particles for effect
    updateParticles(dt);
    // Drift asteroids on title/gameover
    for (const a of asteroids) {
      a.x += a.vx * dt;
      a.y += a.vy * dt;
      a.rot += a.rotSpeed * dt;
      wrap(a);
    }
    return;
  }

  if (gameState === 'levelclear') {
    levelTimer += dt;
    updateParticles(dt);
    if (levelTimer > 2) nextLevel();
    return;
  }

  // Ship
  if (ship.alive) {
    if (isDown('left')) ship.angle -= SHIP_TURN * dt;
    if (isDown('right')) ship.angle += SHIP_TURN * dt;

    ship.thrusting = isDown('thrust');
    if (ship.thrusting) {
      ship.vx += Math.cos(ship.angle) * SHIP_THRUST * dt;
      ship.vy += Math.sin(ship.angle) * SHIP_THRUST * dt;
      // Thrust particles
      if (Math.random() < 0.7) {
        const ex = ship.x - Math.cos(ship.angle) * SHIP_SIZE;
        const ey = ship.y - Math.sin(ship.angle) * SHIP_SIZE;
        spawnParticles(ex, ey, PARTICLE_COUNT_THRUST, `hsl(${20 + Math.random() * 30}, 100%, ${50 + Math.random() * 40}%)`, 0.4);
      }
    }

    ship.vx *= SHIP_DRAG;
    ship.vy *= SHIP_DRAG;
    ship.x += ship.vx * dt;
    ship.y += ship.vy * dt;
    wrap(ship);

    // Fire
    fireTimer -= dt;
    if (isDown('fire') && fireTimer <= 0 && bullets.length < BULLET_MAX) {
      fireTimer = FIRE_RATE;
      bullets.push({
        x: ship.x + Math.cos(ship.angle) * SHIP_SIZE,
        y: ship.y + Math.sin(ship.angle) * SHIP_SIZE,
        vx: Math.cos(ship.angle) * BULLET_SPEED + ship.vx * 0.3,
        vy: Math.sin(ship.angle) * BULLET_SPEED + ship.vy * 0.3,
        life: BULLET_LIFE
      });
    }

    // Invulnerability
    if (invulnTimer > 0) invulnTimer -= dt;

    // Ship-asteroid collision
    if (invulnTimer <= 0) {
      for (const a of asteroids) {
        if (dist(ship.x, ship.y, a.x, a.y) < a.r + SHIP_SIZE * 0.6) {
          destroyShip();
          break;
        }
      }
    }
  }

  // Bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;
    wrap(b);
    if (b.life <= 0) { bullets.splice(i, 1); continue; }

    // Bullet-asteroid collision
    for (let j = asteroids.length - 1; j >= 0; j--) {
      const a = asteroids[j];
      if (dist(b.x, b.y, a.x, a.y) < a.r) {
        bullets.splice(i, 1);
        destroyAsteroid(j);
        break;
      }
    }
  }

  // Asteroids
  for (const a of asteroids) {
    a.x += a.vx * dt;
    a.y += a.vy * dt;
    a.rot += a.rotSpeed * dt;
    wrap(a);
  }

  // Particles
  updateParticles(dt);

  // Level clear check
  if (asteroids.length === 0 && gameState === 'playing') {
    gameState = 'levelclear';
    levelTimer = 0;
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function destroyAsteroid(idx) {
  const a = asteroids[idx];
  score += ASTEROID_SCORES[a.sizeIdx];
  spawnParticles(a.x, a.y, PARTICLE_COUNT_EXPLODE, undefined, 0.8);
  asteroids.splice(idx, 1);

  if (a.sizeIdx < 2) {
    const newSize = a.sizeIdx + 1;
    for (let i = 0; i < 2; i++) {
      const angle = Math.random() * TAU;
      const speed = ASTEROID_SPEED_BASE + Math.random() * ASTEROID_SPEED_RANGE + level * 10;
      asteroids.push(createAsteroid(a.x, a.y, newSize, {
        x: Math.cos(angle) * speed,
        y: Math.sin(angle) * speed
      }));
    }
  }
}

function destroyShip() {
  ship.alive = false;
  spawnParticles(ship.x, ship.y, 30, '#0ff', 1);
  spawnParticles(ship.x, ship.y, 15, '#fff', 0.5);
  lives--;
  if (lives <= 0) {
    setTimeout(() => { gameState = 'gameover'; }, 1500);
  } else {
    setTimeout(() => { resetShip(); }, 1500);
  }
}

// --- Draw ---
function draw() {
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, W, H);

  // Stars
  const time = performance.now() / 1000;
  for (const s of stars) {
    const twinkle = (Math.sin(time * 1.5 + s.twinkle) + 1) * 0.5;
    const alpha = s.a * (0.5 + twinkle * 0.5);
    ctx.fillStyle = `rgba(200, 220, 255, ${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, TAU);
    ctx.fill();
  }

  // Particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * alpha, 0, TAU);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Asteroids
  for (const a of asteroids) {
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.rot);
    ctx.strokeStyle = 'rgba(180, 200, 220, 0.9)';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = 'rgba(100, 180, 255, 0.5)';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(a.verts[0].x, a.verts[0].y);
    for (let i = 1; i < a.verts.length; i++) {
      ctx.lineTo(a.verts[i].x, a.verts[i].y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Bullets
  for (const b of bullets) {
    const alpha = Math.min(1, b.life / 0.3);
    ctx.fillStyle = `rgba(0, 255, 200, ${alpha})`;
    ctx.shadowColor = 'rgba(0, 255, 200, 0.8)';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 2.5, 0, TAU);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Ship
  if (ship && ship.alive) {
    // Blink during invulnerability
    if (invulnTimer > 0 && Math.floor(invulnTimer * 8) % 2 === 0) {
      // skip draw (blink)
    } else {
      ctx.save();
      ctx.translate(ship.x, ship.y);
      ctx.rotate(ship.angle);
      ctx.strokeStyle = '#0fc';
      ctx.lineWidth = 2;
      ctx.shadowColor = 'rgba(0, 255, 200, 0.7)';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.moveTo(SHIP_SIZE, 0);
      ctx.lineTo(-SHIP_SIZE * 0.7, -SHIP_SIZE * 0.6);
      ctx.lineTo(-SHIP_SIZE * 0.4, 0);
      ctx.lineTo(-SHIP_SIZE * 0.7, SHIP_SIZE * 0.6);
      ctx.closePath();
      ctx.stroke();

      // Thrust flame
      if (ship.thrusting) {
        ctx.strokeStyle = `hsl(${30 + Math.random() * 20}, 100%, ${50 + Math.random() * 30}%)`;
        ctx.lineWidth = 1.5;
        ctx.shadowColor = 'rgba(255, 150, 30, 0.8)';
        const flicker = 0.7 + Math.random() * 0.6;
        ctx.beginPath();
        ctx.moveTo(-SHIP_SIZE * 0.5, -SHIP_SIZE * 0.25);
        ctx.lineTo(-SHIP_SIZE * (0.8 + flicker * 0.4), 0);
        ctx.lineTo(-SHIP_SIZE * 0.5, SHIP_SIZE * 0.25);
        ctx.stroke();
      }

      ctx.shadowBlur = 0;
      ctx.restore();
    }
  }

  // HUD
  drawHUD();

  // Overlays
  if (gameState === 'title') drawTitle();
  if (gameState === 'gameover') drawGameOver();
  if (gameState === 'levelclear') drawLevelClear();
}

function drawHUD() {
  // Score
  ctx.fillStyle = '#0fc';
  ctx.shadowColor = 'rgba(0, 255, 200, 0.5)';
  ctx.shadowBlur = 6;
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(score.toString().padStart(6, '0'), 20, 40);

  // Lives
  for (let i = 0; i < lives; i++) {
    ctx.save();
    ctx.translate(W - 30 - i * 30, 35);
    ctx.rotate(-Math.PI / 2);
    ctx.strokeStyle = '#0fc';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(10, 0);
    ctx.lineTo(-7, -6);
    ctx.lineTo(-4, 0);
    ctx.lineTo(-7, 6);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  // Level
  ctx.fillStyle = 'rgba(0, 255, 200, 0.5)';
  ctx.font = '14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`LEVEL ${level}`, W / 2, 30);

  ctx.shadowBlur = 0;
}

function drawTitle() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
  ctx.fillRect(0, 0, W, H);

  ctx.shadowColor = 'rgba(0, 255, 200, 0.8)';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#0fc';
  ctx.font = `bold ${Math.min(72, W * 0.1)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('ASTEROIDS', W / 2, H / 2 - 40);

  ctx.shadowBlur = 6;
  ctx.font = '18px monospace';
  ctx.fillStyle = 'rgba(0, 255, 200, 0.7)';
  const blink = Math.sin(performance.now() / 500) > 0;
  if (blink) {
    ctx.fillText(isTouchDevice ? 'TAP TO START' : 'PRESS ENTER TO START', W / 2, H / 2 + 20);
  }

  ctx.font = '14px monospace';
  ctx.fillStyle = 'rgba(0, 255, 200, 0.4)';
  ctx.fillText('WASD or ARROWS to move — SPACE to shoot', W / 2, H / 2 + 60);
  ctx.shadowBlur = 0;
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
  ctx.fillRect(0, 0, W, H);

  ctx.shadowColor = 'rgba(255, 50, 50, 0.8)';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#f55';
  ctx.font = `bold ${Math.min(60, W * 0.08)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 30);

  ctx.shadowBlur = 6;
  ctx.fillStyle = '#0fc';
  ctx.font = '24px monospace';
  ctx.fillText(`SCORE: ${score}`, W / 2, H / 2 + 20);

  ctx.font = '16px monospace';
  ctx.fillStyle = 'rgba(0, 255, 200, 0.7)';
  const blink = Math.sin(performance.now() / 500) > 0;
  if (blink) {
    ctx.fillText(isTouchDevice ? 'TAP TO RESTART' : 'PRESS ENTER TO RESTART', W / 2, H / 2 + 60);
  }
  ctx.shadowBlur = 0;
}

function drawLevelClear() {
  ctx.shadowColor = 'rgba(0, 255, 200, 0.8)';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#0fc';
  ctx.font = `bold ${Math.min(48, W * 0.07)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(`LEVEL ${level} COMPLETE`, W / 2, H / 2);
  ctx.shadowBlur = 0;
}

// --- Game Loop ---
let lastTime = 0;
function loop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// --- Start ---
function startTitle() {
  gameState = 'title';
  ship = null;
  bullets = [];
  asteroids = [];
  particles = [];
  score = 0;
  lives = LIVES_START;
  level = 1;
  createStars();
  // Spawn some drifting asteroids for the title screen
  for (let i = 0; i < 6; i++) {
    asteroids.push(createAsteroid(Math.random() * W, Math.random() * H, 0));
  }
}

startTitle();
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
